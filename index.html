<body class="scroller">

    <!-- Loading overlay -->
    <div class="loading-screen" id="loading-screen">
        <div></div>
        <span class="loader"></span>
    </div>

    <!-- Settings panel -->
    <div id="settings-c">
        <i id="closer" class="fa-solid fa-xmark"></i>
        <div id="settings-cc" class="scroller">

            <h2 style="font-family: NEON, sans-serif;">
                <i class="fa-solid fa-pen" style="margin-right: 20px;"></i>Styles
            </h2>
            <div style="display: flex;">
                <div datat="2||#e5d0c3||#d46200||all 0.2s ease-in-out" class="styles-divs">Sharp</div>
                <div datat="10||#c3d2e5||#00a3d4||all 0.2s ease-in-out" class="styles-divs">Soft</div>
                <div datat="5||#c3d0e5||#0078d4||all 0s ease-in-out"    class="styles-divs">Still</div>
            </div>

            <h2 style="font-family: NEON, sans-serif;">
                <i class="fa-solid fa-gear" style="margin-right: 20px;"></i>3D Model Viewer
            </h2>
            <div class="display-type1">
                <h5>Zoom Sensitivity</h5>
                <div class="wrapper" style="--wi: 50%">
                    <input id="zoomRange" class="range-class" type="range" min="0" max="100" value="50" step="12.5">
                </div>
            </div>
            <div class="display-type1">
                <h5>Texture Quality</h5>
                <div style="display:flex;gap:8px;">
                    <div class="styles-divs" id="tq-low">Low</div>
                    <div class="styles-divs" id="tq-mid">Mid</div>
                    <div class="styles-divs" id="tq-high" style="outline:2px solid var(--accent-color)">High</div>
                </div>
            </div>

        </div>
    </div>

    <!-- App header -->
    <h1>
        <i class="fa-solid fa-cubes" style="margin-right: 10px; color: var(--accent-color);"></i>SnapshotX
    </h1>

    <div id="header">
        <button class="btn" id="import-btn">Import</button>
        <button class="btn" id="export-btn">Save</button>
        <button class="btn" id="settings-btn">Settings</button>
    </div>

    <div id="world-header">
        <button class="preview-btn" id="world-objects">World Objects</button>
        <button class="preview-btn" id="prototypes">Prototypes</button>
        <button class="preview-btn" id="links">Links</button>
        <button class="preview-btn" id="object-links">Object Links</button>
    </div>

    <!-- Hidden file input -->
    <input type="file" accept=".json,.kgm" style="display: none;">

    <!-- Size indicator -->
    <div id="size-previewer">0</div>

    <!-- Previewers -->
    <div id="world-objects-previewer" class="previewer">
        <div class="preview scroller"><ul></ul></div>
        <div class="preview scroller"></div>
    </div>

    <div id="prototypes-previewer" class="previewer">
        <div class="preview scroller"><ul></ul></div>
        <div class="preview scroller"></div>
    </div>

    <div id="links-previewer" class="previewer">
        <div class="preview scroller"><ul></ul></div>
        <div class="preview scroller"></div>
    </div>

    <div id="object-links-previewer" class="previewer">
        <div class="preview scroller"><ul></ul></div>
        <div class="preview scroller"></div>
    </div>

    <!-- Single entry point — enums.js and decoder.js are imported by app.js -->
    <script type="module" src="app.js"></script>

</body>
</html>
